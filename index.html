<!DOCTYPE html>
<html>
<head>
  <title>Video Call Link</title>
</head>
<body style="text-align:center; font-family:Arial;">

  <h2>Video Call Start Karein</h2>

  <button onclick="openCall()" style="padding:15px 20px; font-size:18px;">
    Join Video Call
  </button>

  <script>
    function openCall() {
      // Google Meet link (aap isko change kar sakte ho)
      window.open("https://meet.google.com/new", "_blank");
    }
  </script>

</body>
</html>
